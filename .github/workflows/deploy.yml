name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/ai-content-analyzer"
          rm: true
          # Exclude files/folders that don't need to be sent
          exclude: ".git,.github,node_modules,.venv,frontend/node_modules,backend/.venv,*.md"

      - name: Execute deployment commands on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/ai-content-analyzer

            if ! command -v docker &> /dev/null || ! docker compose version &> /dev/null; then
              echo "Installing/Updating Docker..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo apt-get update && sudo apt-get install -y docker-buildx-plugin docker-compose-plugin
            fi

            sudo docker compose down --remove-orphans
            sudo docker system prune -af
            sudo docker volume prune -f
            sudo docker builder prune -af

            cat << 'EOF' > .env
            ${{ secrets.ENV_FILE }}
            EOF

            sudo docker compose build --no-cache
            sudo docker compose up -d
